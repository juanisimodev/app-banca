<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - App Banca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app-theme.css}">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            max-width: 400px;
            width: 100%;
            margin: 1rem;
        }
    </style>
</head>
<body class="app-background">
    <!-- Vista de inicio de sesion para autenticacion por RUT -->
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-6">
                <div class="card shadow-lg login-card app-surface-strong border-0">
                    <div class="card-body p-4 p-sm-5">
                        <div class="text-center mb-4">
                            <h1 class="h3 mb-3 fw-bold">🏦 App Banca</h1>
                            <p class="text-muted">Ingresa tu RUT y contraseña</p>
                        </div>

                        <!-- Mensajes de error -->
                        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                            <i class="bi bi-exclamation-triangle-fill"></i>
                            <span th:text="${error}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>

                        <!-- Mensaje de logout exitoso -->
                        <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
                            <i class="bi bi-check-circle-fill"></i>
                            <span th:text="${message}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>

                        <!-- Formulario de login -->
                        <form th:action="@{/login}" method="post">
                            <div class="mb-3">
                                <label for="rut" class="form-label fw-semibold">RUT</label>
                                <input type="text" 
                                       class="form-control form-control-lg" 
                                       id="rut" 
                                       name="rut" 
                                       placeholder="12.345.678-9" 
                                       required 
                                       autofocus>
                            </div>

                            <div class="mb-4">
                                <label for="password" class="form-label fw-semibold">Contraseña</label>
                                <input type="password" 
                                       class="form-control form-control-lg" 
                                       id="password" 
                                       name="password" 
                                       placeholder="••••••••" 
                                       required>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    Iniciar Sesión
                                </button>
                            </div>
                        </form>

                        <!-- Información de usuarios de prueba -->
                        <div class="mt-4 p-3 rounded-3 app-surface">
                            <small class="text-muted d-block mb-2"><strong>Usuarios de prueba:</strong></small>
                            <small class="text-muted d-block">👤 Usuario: <code>12.345.678-9</code> / <code>user123</code></small>
                            <small class="text-muted d-block">🔐 Admin: <code>1-9</code> / <code>admin123</code></small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
