<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transferir - App Banca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/app-theme.css}">
</head>
<body class="app-background">
    <!-- Vista de transferencia entre cuentas para clientes autenticados -->
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">🏦 App Banca</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/dashboard">
                            <i class="bi bi-house-door"></i> Inicio
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/transfer">
                            <i class="bi bi-arrow-left-right"></i> Transferir
                        </a>
                    </li>
                    <li class="nav-item">
                        <form th:action="@{/logout}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-link nav-link text-white">
                                <i class="bi bi-box-arrow-right"></i> Salir
                            </button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Contenido principal -->
    <div class="container mb-5 app-page-shell">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-8">
                <!-- Mensajes de error en ROJO -->
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                    <strong>Error:</strong> <span th:text="${error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <!-- Mensaje de éxito -->
                <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="bi bi-check-circle-fill"></i>
                    <span th:text="${success}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <!-- Tarjeta del formulario -->
                <div class="card shadow-sm app-surface border-0">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">
                            <i class="bi bi-arrow-left-right"></i> Nueva Transferencia
                        </h4>
                    </div>
                    <div class="card-body p-4">
                        <!-- Resumen de cuentas -->
                        <div class="alert alert-info mb-4 app-surface-strong border-0">
                            <h6 class="mb-2 fw-bold"><i class="bi bi-wallet2"></i> Tus Cuentas:</h6>
                            <div th:each="cuenta : ${cuentas}" class="mb-1">
                                <span th:text="${cuenta.tipo == T(com.banca.app.domain.AccountType).AHORRO ? '💰 Ahorro' : '💳 Corriente'}"></span>: 
                                <strong>$<span th:text="${#numbers.formatDecimal(cuenta.saldo, 0, 'COMMA', 0, 'POINT')}"></span></strong>
                            </div>
                        </div>

                        <!-- Formulario de transferencia -->
                        <form th:action="@{/transfer}" th:object="${transferRequest}" method="post">
                            <!-- Cuenta Origen -->
                            <div class="mb-3">
                                <label for="tipoCuentaOrigen" class="form-label fw-semibold">
                                    <i class="bi bi-bank"></i> Cuenta Origen
                                </label>
                                <select class="form-select form-select-lg" 
                                        id="tipoCuentaOrigen" 
                                        name="tipoCuentaOrigen" 
                                        required>
                                    <option value="">Selecciona una cuenta</option>
                                    <option th:each="cuenta : ${cuentas}" 
                                            th:value="${cuenta.tipo}"
                                            th:text="${cuenta.tipo == T(com.banca.app.domain.AccountType).AHORRO ? 'Cuenta de Ahorro - ' + cuenta.numeroCuenta : 'Cuenta Corriente - ' + cuenta.numeroCuenta}">
                                    </option>
                                </select>
                            </div>

                            <hr class="my-4">

                            <!-- RUT Destino -->
                            <div class="mb-3">
                                <label for="rutDestino" class="form-label fw-semibold">
                                    <i class="bi bi-person"></i> RUT Destino
                                </label>
                                <input type="text" 
                                       class="form-control form-control-lg" 
                                       th:field="*{rutDestino}"
                                       id="rutDestino" 
                                       placeholder="12.345.678-9" 
                                       required>
                                <div th:if="${#fields.hasErrors('rutDestino')}" class="text-danger mt-1">
                                    <small th:errors="*{rutDestino}"></small>
                                </div>
                            </div>

                            <!-- Tipo de Cuenta Destino -->
                            <div class="mb-3">
                                <label for="tipoCuentaDestino" class="form-label fw-semibold">
                                    <i class="bi bi-credit-card"></i> Tipo de Cuenta Destino
                                </label>
                                <select class="form-select form-select-lg" 
                                        th:field="*{tipoCuentaDestino}"
                                        id="tipoCuentaDestino" 
                                        required>
                                    <option value="">Selecciona un tipo</option>
                                    <option th:each="tipo : ${accountTypes}" 
                                            th:value="${tipo}" 
                                            th:text="${tipo == T(com.banca.app.domain.AccountType).AHORRO ? 'Cuenta de Ahorro' : 'Cuenta Corriente'}">
                                    </option>
                                </select>
                                <div th:if="${#fields.hasErrors('tipoCuentaDestino')}" class="text-danger mt-1">
                                    <small th:errors="*{tipoCuentaDestino}"></small>
                                </div>
                            </div>

                            <!-- Monto -->
                            <div class="mb-3">
                                <label for="monto" class="form-label fw-semibold">
                                    <i class="bi bi-cash-coin"></i> Monto a Transferir
                                </label>
                                <div class="input-group input-group-lg">
                                    <span class="input-group-text">$</span>
                                    <input type="number" 
                                           class="form-control" 
                                           th:field="*{monto}"
                                           id="monto" 
                                           placeholder="0" 
                                           step="0.01"
                                           min="0.01"
                                           required>
                                </div>
                                <div th:if="${#fields.hasErrors('monto')}" class="text-danger mt-1">
                                    <small th:errors="*{monto}"></small>
                                </div>
                            </div>

                            <!-- Descripción (opcional) -->
                            <div class="mb-4">
                                <label for="descripcion" class="form-label fw-semibold">
                                    <i class="bi bi-pencil"></i> Descripción (Opcional)
                                </label>
                                <textarea class="form-control" 
                                          th:field="*{descripcion}"
                                          id="descripcion" 
                                          rows="2" 
                                          placeholder="Motivo de la transferencia..."></textarea>
                            </div>

                            <!-- Botones -->
                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <a href="/dashboard" class="btn btn-outline-secondary btn-lg">
                                    <i class="bi bi-x-circle"></i> Cancelar
                                </a>
                                <button type="submit" class="btn btn-primary btn-lg">
                                    <i class="bi bi-check-circle"></i> Transferir
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Información de seguridad -->
                <div class="alert alert-warning mt-4 app-surface-strong border-0">
                    <i class="bi bi-shield-check"></i>
                    <strong>Importante:</strong> Verifica los datos antes de confirmar. Las transferencias son inmediatas y no se pueden revertir.
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
